<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paylo – Set new password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    .message { padding: 1rem; border-radius: 8px; margin: 1rem 0; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .muted { color: #6c757d; font-size: 0.9rem; margin-top: 1rem; }
    label { display: block; margin-top: 1rem; font-weight: 500; }
    input[type="password"] { width: 100%; padding: 10px 12px; margin-top: 4px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 12px 24px; background: #0d9488; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-errors { color: #721c24; font-size: 0.9rem; margin-top: 4px; }
    a.app-link { display: inline-block; margin-top: 1rem; padding: 12px 20px; background: #0d9488; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <h1 id="title">Paylo – Set new password</h1>
  <div id="status">Verifying your link…</div>
  <div id="message"></div>
  <div id="form-container" style="display: none;">
    <p class="muted" id="form-desc"></p>
    <form id="password-form">
      <label for="new-password" id="label-password">New password</label>
      <input type="password" id="new-password" name="newPassword" minlength="6" autocomplete="new-password" required />
      <div id="err-password" class="form-errors"></div>
      <label for="confirm-password" id="label-confirm">Confirm password</label>
      <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required />
      <div id="err-confirm" class="form-errors"></div>
      <button type="submit" id="submit-btn">Set new password</button>
    </form>
  </div>

  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase().startsWith('tr') ? 'tr' : 'en';
      var i18n = {
        tr: {
          title: 'Paylo – Yeni şifre oluştur',
          verifying: 'Bağlantı doğrulanıyor…',
          config: 'Yapılandırma gerekli',
          configMsg: 'index.html dosyasında SUPABASE_URL ve SUPABASE_ANON_KEY değerlerini ayarlayın.',
          invalid: 'Geçersiz veya süresi dolmuş bağlantı',
          invalidMsg: 'Bu bağlantı geçersiz veya süresi dolmuş. Paylo uygulamasından tekrar şifre sıfırlama isteyin.',
          error: 'Bir hata oluştu',
          errorMsg: 'Lütfen tekrar deneyin veya uygulamadan yeni sıfırlama bağlantısı isteyin.',
          setPassword: 'Yeni şifrenizi belirleyin',
          formDesc: 'Yeni şifrenizi aşağıya girin. Ardından Paylo uygulamasına bu şifre ile giriş yapabilirsiniz.',
          newPassword: 'Yeni şifre',
          confirmPassword: 'Şifreyi onayla',
          submit: 'Şifreyi güncelle',
          passwordShort: 'Şifre en az 6 karakter olmalıdır',
          passwordsMismatch: 'Şifreler eşleşmiyor',
          updated: 'Şifre güncellendi',
          success: 'Şifreniz güncellendi. Paylo uygulamasını açıp yeni şifrenizle giriş yapabilirsiniz.',
          openApp: 'Paylo uygulamasını aç',
          manual: 'Veya uygulamayı manuel açıp e-posta ve yeni şifrenizle giriş yapın.',
          updateFailed: 'Güncelleme başarısız. Lütfen tekrar deneyin.'
        },
        en: {
          title: 'Paylo – Set new password',
          verifying: 'Verifying your link…',
          config: 'Configuration needed',
          configMsg: 'Set SUPABASE_URL and SUPABASE_ANON_KEY in index.html (see README).',
          invalid: 'Invalid or expired link',
          invalidMsg: 'This link is invalid or has expired. Request a new password reset from the Paylo app.',
          error: 'Something went wrong',
          errorMsg: 'Please try again or request a new reset link from the app.',
          setPassword: 'Set your new password',
          formDesc: 'Enter your new password below. You will then sign in to the Paylo app with this password.',
          newPassword: 'New password',
          confirmPassword: 'Confirm password',
          submit: 'Set new password',
          passwordShort: 'Password must be at least 6 characters',
          passwordsMismatch: 'Passwords do not match',
          updated: 'Password updated',
          success: 'Your password has been updated. You can open the Paylo app and sign in with your new password.',
          openApp: 'Open Paylo app',
          manual: 'Or open the app manually and log in with your email and new password.',
          updateFailed: 'Update failed. Please try again.'
        }
      };
      var t = i18n[lang];

      document.getElementById('title').textContent = t.title;
      document.getElementById('status').textContent = t.verifying;
      document.getElementById('form-desc').textContent = t.formDesc;
      document.getElementById('label-password').textContent = t.newPassword;
      document.getElementById('label-confirm').textContent = t.confirmPassword;
      document.getElementById('submit-btn').textContent = t.submit;

      (async function () {
        var SUPABASE_URL = 'https://rgwbkymosmhwwawuzblg.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnd2JreW1vc21od3dhd3V6YmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM5NjA4MDcsImV4cCI6MjA3OTUzNjgwN30.7n9mp_YH32CfOII3yFdadRTUCDh-ljJL5eh2fM44NLY';

        if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.indexOf('YOUR_') !== -1 || SUPABASE_ANON_KEY.indexOf('YOUR_') !== -1) {
          document.getElementById('status').textContent = t.config;
          document.getElementById('message').innerHTML = '<div class="message error">' + t.configMsg + '</div>';
          return;
        }

        var hash = window.location.hash ? window.location.hash.slice(1) : '';
        var params = new URLSearchParams(hash);
        var accessToken = params.get('access_token');
        var refreshToken = params.get('refresh_token');
        var type = params.get('type');

        if (!accessToken || !refreshToken || type !== 'recovery') {
          document.getElementById('status').textContent = t.invalid;
          document.getElementById('message').innerHTML = '<div class="message error">' + t.invalidMsg + '</div>';
          return;
        }

        var supabase;
        try {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          var sessionResult = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
          if (sessionResult.error) throw sessionResult.error;
        } catch (err) {
          console.error(err);
          document.getElementById('status').textContent = t.error;
          document.getElementById('message').innerHTML = '<div class="message error">' + (err.message || t.errorMsg) + '</div>';
          return;
        }

        document.getElementById('status').textContent = t.setPassword;
        document.getElementById('form-container').style.display = 'block';

        document.getElementById('password-form').addEventListener('submit', async function (e) {
          e.preventDefault();
          var newPassword = document.getElementById('new-password').value;
          var confirmPassword = document.getElementById('confirm-password').value;
          var errPassword = document.getElementById('err-password');
          var errConfirm = document.getElementById('err-confirm');
          var btn = document.getElementById('submit-btn');

          errPassword.textContent = '';
          errConfirm.textContent = '';
          if (newPassword.length < 6) {
            errPassword.textContent = t.passwordShort;
            return;
          }
          if (newPassword !== confirmPassword) {
            errConfirm.textContent = t.passwordsMismatch;
            return;
          }

          btn.disabled = true;
          try {
            var updateResult = await supabase.auth.updateUser({ password: newPassword });
            if (updateResult.error) throw updateResult.error;
            window.history.replaceState(null, '', window.location.pathname + window.location.search);
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('status').textContent = t.updated;
            document.getElementById('message').innerHTML =
              '<div class="message success">' + t.success + '</div>' +
              '<p><a href="paylo://" class="app-link">' + t.openApp + '</a></p>' +
              '<p class="muted">' + t.manual + '</p>';
          } catch (err) {
            console.error(err);
            errPassword.textContent = err.message || t.updateFailed;
          } finally {
            btn.disabled = false;
          }
        });
      })();
    })();
  </script>
</body>
</html>
